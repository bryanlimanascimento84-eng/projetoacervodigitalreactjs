name: Deploy Acervo Digital

on:
  push:
    branches: [ main ] # Dispara o deploy sempre que você der push na main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Passo 1: Instalar e Buildar o Frontend (React)
      - name: Build Frontend
        run: |
          npm install
          npm run build
        # Nota: Ajuste o comando se o seu package.json do React estiver em uma subpasta

      # Passo 2: Instalar Dependências do Backend
      - name: Setup Backend
        run: |
          cd backend
          npm install
          
